# fly.toml app configuration file generated for anchor-9mhcua on 2026-05-29T07:02:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'anchor-9mhcua'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_PATH = '/app/data/anchor.db'
  HOST = '0.0.0.0'
  PORT = '8080'
  UPLOAD_DIR = '/app/data/uploads'

[[mounts]]
  source = 'anchor_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
