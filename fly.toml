# fly.toml — Fly.io configuration for Anchor.
#
# NOTE: there is intentionally no `app = "..."` line here. When you create the
# app on Fly (via the dashboard or `fly launch`), Fly assigns/uses the correct
# name automatically. Hardcoding a name that doesn't match the real app causes
# routing problems, so we leave it out.
#
# The [mounts] section gives the app a persistent disk for the SQLite database
# and uploaded cover images. Without it, all data is wiped on every restart.

primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  DATABASE_PATH = "/app/data/anchor.db"
  UPLOAD_DIR = "/app/data/uploads"

[mounts]
  source = "anchor_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
